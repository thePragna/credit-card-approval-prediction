<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Check Eligibility - CreditCheck</title>
<style>
  :root {
    --navy: #0B2545;
    --teal: #2A9D8F;
    --gold: #C9A227;
    --paper: #F7F5F0;
    --ink: #1F2937;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  header {
    background: var(--navy);
    color: white;
    padding: 20px 40px;
  }
  header .brand {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 20px;
    font-weight: 700;
  }
  header .brand span { color: var(--gold); }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }
  .card {
    background: white;
    border: 1px solid #E5E1D6;
    border-radius: 10px;
    padding: 40px 44px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28px;
    color: var(--navy);
    text-align: center;
    margin: 0 0 36px;
  }
  form { display: contents; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px 24px;
    margin-bottom: 32px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6B7280;
  }
  input, select {
    padding: 10px 12px;
    border: 1px solid #D8D3C7;
    border-radius: 6px;
    font-size: 14px;
    background: var(--paper);
    color: var(--ink);
    appearance: auto;
  }
  input:focus, select:focus {
    outline: 2px solid var(--teal);
    outline-offset: 1px;
  }
  hr {
    border: none;
    border-top: 1px solid #E5E1D6;
    margin: 0 0 28px;
  }
  .submit {
    width: 100%;
    background: var(--teal);
    color: white;
    border: none;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .submit:hover { background: #22867a; }
  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
  <header><div class="brand">Credit<span>Check</span></div></header>
  <main>
    <div class="card">
      <h1>Credit Card Approval Prediction</h1>

      <form action="/predict" method="POST">
        <div class="grid">

          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
              <option value="F">Female</option>
              <option value="M">Male</option>
            </select>
          </div>

          <div class="field">
            <label for="own_car">Own car or not</label>
            <select id="own_car" name="own_car" required>
              <option value="Y">Yes</option>
              <option value="N">No</option>
            </select>
          </div>

          <div class="field">
            <label for="own_realty">Own realty or not</label>
            <select id="own_realty" name="own_realty" required>
              <option value="N">No</option>
              <option value="Y">Yes</option>
            </select>
          </div>

          <div class="field">
            <label for="income">Total annual income</label>
            <input type="number" id="income" name="income" min="0" step="1000" required>
          </div>

          <div class="field">
            <label for="income_type">Type of income</label>
            <select id="income_type" name="income_type" required>
              <option value="Working">Working</option>
              <option value="Commercial associate">Commercial associate</option>
              <option value="State servant">State servant</option>
              <option value="Pensioner">Pensioner</option>
              <option value="Student">Student</option>
            </select>
          </div>

          <div class="field">
            <label for="education">Education</label>
            <select id="education" name="education" required>
              <option value="Secondary / secondary special">Secondary / secondary special</option>
              <option value="Higher education">Higher education</option>
              <option value="Incomplete higher">Incomplete higher</option>
              <option value="Lower secondary">Lower secondary</option>
              <option value="Academic degree">Academic degree</option>
            </select>
          </div>

          <div class="field">
            <label for="family_status">Family status</label>
            <select id="family_status" name="family_status" required>
              <option value="Single / not married">Single / not married</option>
              <option value="Married">Married</option>
              <option value="Civil marriage">Civil marriage</option>
              <option value="Separated">Separated</option>
              <option value="Widow">Widow</option>
            </select>
          </div>

          <div class="field">
            <label for="housing_type">Type of housing</label>
            <select id="housing_type" name="housing_type" required>
              <option value="House / apartment">House / apartment</option>
              <option value="Rented apartment">Rented apartment</option>
              <option value="With parents">With parents</option>
              <option value="Municipal apartment">Municipal apartment</option>
              <option value="Office apartment">Office apartment</option>
              <option value="Co-op apartment">Co-op apartment</option>
            </select>
          </div>

          <div class="field">
            <label for="age">Age (years)</label>
            <input type="number" id="age" name="age" min="18" max="100" required>
          </div>

          <div class="field">
            <label for="years_employed">Years employed</label>
            <input type="number" id="years_employed" name="years_employed" min="0" max="60" value="0" required>
          </div>

          <div class="field">
            <label for="children">Number of children</label>
            <input type="number" id="children" name="children" min="0" max="20" value="0" required>
          </div>

          <div class="field">
            <label for="fam_members">Family members</label>
            <input type="number" id="fam_members" name="fam_members" min="1" max="20" value="1" required>
          </div>

          <div class="field">
            <label for="work_phone">Work phone on file</label>
            <select id="work_phone" name="work_phone" required>
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>

          <div class="field">
            <label for="phone">Phone on file</label>
            <select id="phone" name="phone" required>
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>

          <div class="field">
            <label for="email">Email on file</label>
            <select id="email" name="email" required>
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>

        </div>

        <hr>
        <button type="submit" class="submit">Predict</button>
      </form>
    </div>
  </main>
</body>
</html>
